<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    
    <title> KaPAO T-shirt Shop</title>
    <link rel ="stylesheet" href="style.css">
    
</head>
<body>

<h1 id="product-title">KaPAO T-shirt</h1>

<button class="get-shirt" onclick="showOrderForm()">New Order</button>
<button class="order-list" onclick="viewList()">View Order list</button>
<div id="order-form" style= "display: none; margin-top: 20px;">
  <p>Nickname: <input type="text" id="nickname"></p>
  <p>Size: 
    <select id="tshirt-size">
      <option value="XS">Extra Small</option>
      <option value="S">Small</option>
      <option value="M">Medium</option>
      <option value="L">Large</option>
      <option value="XL">Extra Large</option>
      <option value="XXL">Extra-Extra-Large</option>
    </select>
  </p>
  <button id="save-btn" class="save-btn" onclick="saveOrder()">Save Order</button>
</div>

<div id="order-list-section" style="display: none; margin-top: 30px;">
    <h3>Order Summary</h3>
    <table id="order-table" border="1" style="width:100%; text-align: center; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>Nickname</th>
                <th>Size</th>
                <th>payment</th>
                <th>Manage</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>
  
</div>

<script type="module">
  // 1. Firebase Imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // 2. Firebase Configuration (Paste your FULL config from Firebase Console here)
  const firebaseConfig = {
    apiKey: "YOUR_FULL_API_KEY", 
    authDomain: "kapao-t-shirt.firebaseapp.com",
    databaseURL: "https://kapao-t-shirt-default-rtdb.firebaseio.com",
    projectId: "kapao-t-shirt",
    storageBucket: "kapao-t-shirt.appspot.com",
    messagingSenderId: "817922399583",
    appId: "1:817922399583:web:02b394cd2726f7827d2aea"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // --- 3. INPUT LISTENER (Show/Hide Save Button) ---
  const nicknameInput = document.getElementById('nickname');
  const saveButton = document.getElementById('save-btn');

  nicknameInput.oninput = function() {
    if (nicknameInput.value.trim() !== "") {
      saveButton.style.display = "block";
    } else {
      saveButton.style.display = "none";
    }
  };

  // --- 4. BUTTON FUNCTIONS (Globalized with 'window.') ---
  window.showOrderForm = () => {
    document.getElementById('order-form').style.display = "block";
  };

  window.viewList = () => {
    const list = document.getElementById('order-list-section');
    list.style.display = (list.style.display === "none" || list.style.display === "") ? "block" : "none";
  };

  window.saveOrder = () => {
    const nameValue = nicknameInput.value.trim();
    const sizeValue = document.getElementById('tshirt-size').value;

    // Only save if nickname is NOT empty (no alert needed now)
    if (nameValue !== "") {
      push(ref(db, 'orders'), {
        nickname: nameValue,
        size: sizeValue,
        paid: false
      });

      // Reset form
      nicknameInput.value = "";
      saveButton.style.display = "none";
      document.getElementById('order-form').style.display = "none";
    }
  };

  // --- 5. REAL-TIME TABLE UPDATE ---
onValue(ref(db, 'orders'), (snapshot) => {
    const tableBody = document.getElementById('table-body');
    tableBody.innerHTML = "";
    const data = snapshot.val();

    if (data) {
        Object.keys(data).forEach(id => {
            const order = data[id];
            const row = document.createElement('tr');

            // Logic: Show "Paid ✓" or the "Pay Now" button
            const statusContent = order.paid 
                ? `<span style="color: green; font-weight: bold;">Paid ✓</span>` 
                : `<button onclick="window.payNow('${id}')" style="background-color: #007dfe; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Pay Now</button>`;

            row.innerHTML = `
                <td>${order.nickname}</td>
                <td>${order.size}</td>
                <td>${statusContent}</td>
                <td><button onclick="window.deleteOrder('${id}')" style="background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Delete</button></td>
            `;
            tableBody.appendChild(row);
        });
    }
});

// --- 6. GLOBAL FUNCTIONS ---
window.payNow = (id) => {
    window.open('https://www.gcash.com/', '_blank'); // Change to your GCash link later
    alert("Please send your payment. The admin will verify it and update your status to 'Paid ✓'.");
};

window.deleteOrder = (id) => {
    const password = prompt("Enter Admin Password to delete:");
    if (password === "1234") {
        if (confirm("Delete this order?")) {
            remove(ref(db, `orders/${id}`));
        }
    } else {
        alert("Wrong password!");
    }
};
</script>
</body>
</html>
